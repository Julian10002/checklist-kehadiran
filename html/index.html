<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Checklist Kehadiran</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #333;
      padding: 6px;
      text-align: center;
    }
    th:first-child, td:first-child {
      text-align: left;
      min-width: 200px;
    }
    .semester{
        text-align: center;
        justify-content: center;
        align-items: center;
        height: 100px;
    }
    .judul {
        text-align: center;
        justify-content: center;
        align-items: center;
        height: 50px;
    }

  </style>
</head>
<body>

<div class="semester">
    <h1>SEMESTER 4</h1>
</div>

<div class="judul">
    <h3>JADWAL</h3>
</div>
    
<table>
  <thead>
    <tr>
      <th>Mata Kuliah</th>
      <th colspan="16">Pertemuan</th>
    </tr>
    <tr id="header-row"></tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>

const STORAGE_KEY = "checklist_kehadiran_s4";    

const pertemuan = 16;

const matkul = [
  "Fisika Listrik Magnet",
  "Sejarah Pendidikan dan PGRI",
  "Sistem Basis Data",
  "Praktikum Sistem Basis Data",
  "Metode Numerik",
  "Arsitektur dan Organisasi Komputer",
  "Manajemen Proyek",
  "Aljabar Linier dan Matrik"
];

const headerRow = document.getElementById("header-row");
headerRow.innerHTML =
  "<th></th>" +
  Array.from({ length: pertemuan }, (_, i) => `<th>P${i+1}</th>`).join("");

const tbody = document.getElementById("table-body");

tbody.innerHTML = matkul.map((mk, rowIndex) => `
  <tr>
    <td>${mk}</td>
    ${Array.from({ length: pertemuan }, (_, colIndex) => `
      <td>
        <input type="checkbox" 
               id="c-${rowIndex}-${colIndex}">
      </td>
    `).join("")}
  </tr>
`).join("");

function saveState() {
    const state = [];
    matkul.forEach((_, rowIndex) => {
      for (let colIndex = 0; colIndex < pertemuan; colIndex++) {
        const el = document.getElementById(`c-${rowIndex}-${colIndex}`);
        if (el) state.push({ id: `c-${rowIndex}-${colIndex}`, checked: el.checked });
      }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    JSON.parse(saved).forEach(({ id, checked }) => {
      const el = document.getElementById(id);
      if (el) el.checked = checked;
    });
  }

   tbody.addEventListener("change", saveState);
  loadState();
</script>

</body>
</html>
